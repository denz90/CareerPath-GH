services:
  - type: web
    name: careerpath-gh-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerpath-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://career-path-gh.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://career-path-gh.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false   # Set manually in Render dashboard
      - key: MAIL_PASSWORD
        sync: false   # Set manually in Render dashboard
      - key: MAIL_FROM
        sync: false   # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: careerpath-db
    databaseName: careerpathgh
    user: careerpathgh
    plan: free
